<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" fill="none">
  <!-- A mark -->
  <g>
    <!-- Left leg of A -->
    <polygon points="4,60 22,60 36,20 27,20" fill="#1B45CC"/>
    <!-- Right leg of A -->
    <polygon points="52,60 34,60 20,20 29,20" fill="#1B45CC"/>
    <!-- Crossbar of A -->
    <rect x="17" y="36" width="22" height="6" rx="1" fill="#1B45CC"/>
    <!-- X accent – left-to-right diagonal (light blue) -->
    <line x1="8" y1="18" x2="32" y2="56" stroke="#4A9EE8" stroke-width="4" stroke-linecap="round"/>
    <!-- X accent – right-to-left diagonal (light blue) -->
    <line x1="48" y1="18" x2="24" y2="56" stroke="#4A9EE8" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="70" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="800" font-size="30" fill="#0F1D3A" letter-spacing="-0.5">AandelenXpress</text>
</svg>
