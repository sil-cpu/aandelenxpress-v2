<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partnerdetail – AandelenXpress</title>
  <link rel="stylesheet" href="dashboard-shared.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    .detail-page-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .detail-card { background: white; border: 1px solid #E8EDF5; border-radius: 12px; overflow: hidden; }
    .detail-card-head { padding: 18px 24px; border-bottom: 1px solid #EEF1F7; }
    .detail-card-title { font-size: 0.9rem; font-weight: 600; color: #0F1D3A; }
    .detail-card-body { padding: 24px; }
    .detail-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
    .detail-field label { display: block; font-size: 0.76rem; font-weight: 600; color: #8A9BB5; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .detail-field .val { font-size: 0.92rem; font-weight: 500; color: #0F1D3A; }
    .partner-avatar-large { width: 64px; height: 64px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; color: white; flex-shrink: 0; }
    .page-title-row { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 28px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500; color: #2B6CB5; text-decoration: none; margin-bottom: 24px; }
    .back-btn:hover { color: #1A3B70; }
    .stat-mini-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .stat-mini { background: #F7F9FC; border: 1px solid #E8EDF5; border-radius: 10px; padding: 14px 16px; text-align: center; }
    .stat-mini-val { font-size: 1.6rem; font-weight: 700; color: #1A3B70; }
    .dossier-row-mini { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #F0F2F7; align-items: center; }
    .dossier-row-mini:last-child { border-bottom: none; }
    .dossier-row-mini a { font-size: 0.82rem; color: #2B6CB5; text-decoration: none; white-space: nowrap; }
    .dossier-row-mini a:hover { text-decoration: underline; }
    .branding-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
    .branding-field { display: flex; flex-direction: column; gap: 6px; }
    .branding-field.full { grid-column: 1 / -1; }
    .branding-field label { font-size: 0.76rem; font-weight: 600; color: #8A9BB5; text-transform: uppercase; letter-spacing: .05em; }
    .branding-field input { height: 40px; border: 1px solid #D9E1ED; border-radius: 10px; padding: 0 12px; font-size: 0.88rem; color: #0F1D3A; }
    .branding-field input:focus { outline: none; border-color: #2B6CB5; box-shadow: 0 0 0 3px rgba(43,108,181,0.1); }
    .branding-actions { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
    .branding-upload { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .branding-upload input[type=file] { font-size: 0.8rem; color: #3f5578; }
    .branding-url { font-size: 0.82rem; color: #6E7E99; }
    .branding-msg { margin-top: 10px; font-size: 0.82rem; color: #2D4F7B; }
    .branding-preview { margin-top: 12px; border: 1px solid #E5ECF7; border-radius: 10px; background: #FAFCFF; padding: 12px; }
    .preview-chip { display: inline-flex; align-items: center; gap: 8px; border: 1px solid #D8E4F5; border-radius: 999px; padding: 6px 10px; font-size: 0.76rem; font-weight: 600; color: #173A66; background: #fff; }
    .preview-color { width: 12px; height: 12px; border-radius: 999px; border: 1px solid rgba(0,0,0,.08); }
    @media (max-width: 1100px) {
      .detail-page-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .branding-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="dash-wrap">

  <!-- SIDEBAR (admin only) -->
  <aside class="dash-sidebar" id="sidebar">
    <div class="dash-logo">
      <img src="AandelenXpress logo.avif" alt="AandelenXpress" class="dash-logo-img">
    </div>
    <nav class="dash-nav" id="sidebarNav"></nav>
    <div class="dash-sidebar-foot">
      <div class="dash-user-row">
        <div class="dash-avatar" id="userInitials">--</div>
        <div class="dash-user-info">
          <div class="dash-user-name" id="userName">Laden...</div>
          <div class="dash-user-email" id="userEmail"></div>
        </div>
      </div>
      <a href="#" class="dash-nav-item" style="margin-top:8px;" onclick="logout();return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Uitloggen
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="dash-main">
    <header class="dash-topbar">
      <span class="dash-topbar-title" id="topbarTitle">Partnerdetail</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="admin-dashboard.html" class="btn-ghost" style="font-size:0.85rem;">
          ← Terug
        </a>
      </div>
    </header>

    <div class="dash-content" id="pageContent">
      <!-- filled by JS -->
    </div>
  </main>
</div>

<script>
const PARTNER_COLORS = ["#1A3B70","#2A5BA0","#17518A","#1D4477","#0D3060","#2048A8","#153580","#0A2850"];
let currentUser = null;
let selectedPartner = null;
const STATUS_MAP = {
  'pending':     { key:'pending',     text:'Aanvraag ingediend' },
  'vragenlijst': { key:'vragenlijst', text:'Vragenlijst' },
  'approved':    { key:'vragenlijst', text:'Vragenlijst' },
  'betaling':    { key:'betaling',    text:'Betaling' },
  'ident':       { key:'ident',       text:'iDIN verwerking' },
  'notary':      { key:'notary',      text:'Notariële akte' },
  'kvk':         { key:'kvk',         text:'KvK inschrijving' },
  'complete':    { key:'complete',    text:'Voltooid' },
  'rejected':    { key:'rejected',    text:'Afgewezen' }
};

function fmtDate(d) {
  return new Date(d).toLocaleDateString("nl-NL", { day:"numeric", month:"long", year:"numeric" });
}

function renderPage(p, dossiers) {
  const initials   = p.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const completed  = dossiers.filter(d => d.status === 'complete').length;
  const inProgress = dossiers.filter(d => d.status !== 'complete' && d.status !== 'rejected').length;
  const isAdmin = currentUser?.type === 'admin';
  const backHref = isAdmin ? 'admin-dashboard.html#partners' : 'reseller-dashboard.html';

  // Monthly chart data – last 6 months
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      label: d.toLocaleDateString('nl-NL', { month: 'short' }),
      key:   `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
      count: 0
    });
  }
  dossiers.forEach(d => {
    const m = (d.createdAt || '').slice(0, 7);
    const slot = months.find(x => x.key === m);
    if (slot) slot.count++;
  });

  document.getElementById("topbarTitle").textContent = p.name;
  document.title = p.name + " – AandelenXpress";

  document.getElementById("pageContent").innerHTML = `
    <a href="${backHref}" class="back-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Terug
    </a>

    <div class="page-title-row">
      <div class="partner-avatar-large" style="background:${p.color};">${initials}</div>
      <div>
        <div style="font-size:1.5rem;font-weight:600;color:#0F1D3A;">${p.name}</div>
        <div style="font-size:0.88rem;color:#718096;margin-top:4px;">${p.contact}</div>
      </div>
      <span class="badge badge-active" style="font-size:0.85rem;padding:6px 14px;margin-left:auto;">Actief</span>
    </div>

    <!-- Statistieken -->
    <div class="stat-mini-grid" style="margin-bottom:20px;">
      <div class="stat-mini">
        <div class="stat-card-label">Totale dossiers</div>
        <div class="stat-mini-val">${p.dossiers}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-card-label">Voltooid</div>
        <div class="stat-mini-val">${completed}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-card-label">In behandeling</div>
        <div class="stat-mini-val">${inProgress}</div>
      </div>
    </div>

    <!-- Chart + Gegevens -->
    <div class="detail-page-grid" style="margin-bottom:20px;">
      <div class="detail-card">
        <div class="detail-card-head"><div class="detail-card-title">Activiteit (6 maanden)</div></div>
        <div class="detail-card-body" style="padding:16px 24px;">
          <canvas id="partnerChart" height="140"></canvas>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:20px;">
        <div class="detail-card">
          <div class="detail-card-head"><div class="detail-card-title">Kantoorgegevens</div></div>
          <div class="detail-card-body">
            <div class="detail-field-grid">
              <div class="detail-field"><label>Kantoornaam</label><div class="val">${p.name}</div></div>
              <div class="detail-field"><label>KvK-nummer</label><div class="val" style="font-family:monospace;">${p.kvk||"—"}</div></div>
            </div>
          </div>
        </div>
        <div class="detail-card">
          <div class="detail-card-head"><div class="detail-card-title">Contactpersoon</div></div>
          <div class="detail-card-body">
            <div class="detail-field-grid">
              <div class="detail-field"><label>Naam</label><div class="val">${p.contact||"—"}</div></div>
              <div class="detail-field"><label>E-mailadres</label><div class="val"><a href="mailto:${p.email}" style="color:#1A3B70;text-decoration:none;">${p.email||"—"}</a></div></div>
            </div>
          </div>
        </div>
        <div class="detail-card">
          <div class="detail-card-head"><div class="detail-card-title">Whitelabel branding</div></div>
          <div class="detail-card-body">
            <div class="branding-form">
              <div class="branding-field full">
                <label>Slug URL</label>
                <input id="brandSlug" placeholder="startjouwbv" />
              </div>
              <div class="branding-field full">
                <label>Logo URL</label>
                <input id="brandLogoUrl" placeholder="https://.../logo.png" />
              </div>
              <div class="branding-field">
                <label>Primaire kleur</label>
                <input id="brandPrimary" placeholder="#1A3B70" />
              </div>
              <div class="branding-field">
                <label>Secundaire kleur</label>
                <input id="brandSecondary" placeholder="#F2F6FB" />
              </div>
              <div class="branding-field full">
                <label>Accentkleur</label>
                <input id="brandAccent" placeholder="#0F1D3A" />
              </div>
            </div>
            <div class="branding-url">Publieke URL: <a id="brandPublicUrl" href="#" target="_blank" rel="noopener">-</a></div>
              <div class="branding-upload">
                <input id="brandLogoFile" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml,image/gif" />
                <button class="btn-ghost" style="height:38px;padding:0 14px;border-radius:9px;font-size:0.82rem;" onclick="uploadBrandLogo();return false;">Logo bestand uploaden</button>
              </div>
            <div class="branding-actions">
              <button class="btn-primary" style="height:38px;padding:0 14px;border-radius:9px;font-size:0.82rem;" onclick="saveBranding()">Branding opslaan</button>
              <a id="brandOpenLink" class="btn-ghost" style="height:38px;padding:0 14px;border-radius:9px;font-size:0.82rem;display:inline-flex;align-items:center;" href="#" target="_blank" rel="noopener">Open whitelabel pagina</a>
            </div>
            <div class="branding-preview">
              <span class="preview-chip"><span class="preview-color" id="previewPrimary"></span>Primair</span>
              <span class="preview-chip"><span class="preview-color" id="previewSecondary"></span>Secundair</span>
              <span class="preview-chip"><span class="preview-color" id="previewAccent"></span>Accent</span>
            </div>
            <div id="brandingMsg" class="branding-msg">Nog niet opgeslagen.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Dossiers -->
    <div class="detail-card">
      <div class="detail-card-head" style="display:flex;align-items:center;justify-content:space-between;">
        <div class="detail-card-title">Dossiers</div>
        <span class="badge badge-active" style="font-size:0.75rem;">${dossiers.length} dossiers</span>
      </div>
      ${dossiers.length > 0 ? `
      <div style="display:grid;grid-template-columns:1fr 150px 120px 50px;gap:12px;padding:12px 16px;border-bottom:1px solid #E8EDF5;background:#FAFBFC;font-weight:500;font-size:0.8rem;color:#8A9BB5;text-transform:uppercase;letter-spacing:0.05em;">
        <span>Bedrijfsnaam</span><span>Status</span><span>Aangemeld</span><span></span>
      </div>
      ${dossiers.map(d => {
        const s = STATUS_MAP[d.status] || { key: d.status, text: d.status };
        const label = d.gewenstNaam || d.clientName || d.id;
        return `
      <div style="display:grid;grid-template-columns:1fr 150px 120px 50px;gap:12px;padding:12px 16px;border-bottom:1px solid #F0F2F7;align-items:center;">
        <a href="dossier-detail.html?nr=${d.id}" style="font-size:0.88rem;font-weight:500;color:#0F1D3A;text-decoration:none;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;">${label}</a>
        <span class="badge badge-${s.key}" style="font-size:0.75rem;justify-self:start;">${s.text}</span>
        <div style="font-size:0.82rem;color:#A0AEC0;">${fmtDate(d.createdAt)}</div>
        <a href="dossier-detail.html?nr=${d.id}" style="font-size:0.82rem;color:#2B6CB5;text-decoration:none;justify-self:end;">→</a>
      </div>`;
      }).join("")}` :
      `<div style="padding:40px;text-align:center;color:#A0AEC0;font-size:0.9rem;">Geen dossiers gevonden voor dit kantoor.</div>`}
    </div>`;

  // Chart.js – activiteit per maand
  const ctx = document.getElementById('partnerChart');
  if (ctx && typeof Chart !== 'undefined') {
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: months.map(m => m.label),
        datasets: [{
          label: 'Dossiers',
          data: months.map(m => m.count),
          borderColor: p.color,
          backgroundColor: p.color + '18',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: p.color,
          tension: 0.35,
          fill: true
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#8A9BB5', font: { size: 11 } } },
          y: { beginAtZero: true, grid: { color: '#F0F2F7' }, ticks: { color: '#8A9BB5', font: { size: 11 }, precision: 0 } }
        }
      }
    });
  }

  loadBranding();
}

function getBrandingPayload() {
  return {
    slug: document.getElementById('brandSlug')?.value.trim() || '',
    logoUrl: document.getElementById('brandLogoUrl')?.value.trim() || '',
    primaryColor: document.getElementById('brandPrimary')?.value.trim() || '#1A3B70',
    secondaryColor: document.getElementById('brandSecondary')?.value.trim() || '#F2F6FB',
    accentColor: document.getElementById('brandAccent')?.value.trim() || '#0F1D3A',
    company: selectedPartner?.name || ''
  };
}

function updateBrandingPreview() {
  const payload = getBrandingPayload();
  const slug = (payload.slug || '').toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  const origin = location.origin.replace(/\/$/, '');
  const url = slug ? `${origin}/${slug}` : origin;
  const anchor = document.getElementById('brandPublicUrl');
  const openLink = document.getElementById('brandOpenLink');
  if (anchor) {
    anchor.textContent = url;
    anchor.href = url;
  }
  if (openLink) openLink.href = url;
  const p = document.getElementById('previewPrimary');
  const s = document.getElementById('previewSecondary');
  const a = document.getElementById('previewAccent');
  if (p) p.style.background = payload.primaryColor;
  if (s) s.style.background = payload.secondaryColor;
  if (a) a.style.background = payload.accentColor;
}

function bindBrandingInputs() {
  ['brandSlug', 'brandLogoUrl', 'brandPrimary', 'brandSecondary', 'brandAccent'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updateBrandingPreview);
  });
}

async function loadBranding() {
  if (!selectedPartner?.email) return;
  try {
    const r = await fetch(`/api/reseller-branding/${encodeURIComponent(selectedPartner.email)}?t=${Date.now()}`, { cache: 'no-store' });
    if (!r.ok) throw new Error('Branding kon niet worden geladen');
    const b = await r.json();
    const map = {
      brandSlug: b.slug || '',
      brandLogoUrl: b.logoUrl || '',
      brandPrimary: b.primaryColor || '#1A3B70',
      brandSecondary: b.secondaryColor || '#F2F6FB',
      brandAccent: b.accentColor || '#0F1D3A'
    };
    Object.keys(map).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = map[id];
    });
    updateBrandingPreview();
    bindBrandingInputs();
    const msg = document.getElementById('brandingMsg');
    if (msg) msg.textContent = 'Branding geladen.';
  } catch (e) {
    const msg = document.getElementById('brandingMsg');
    if (msg) msg.textContent = e.message || 'Branding laden mislukt.';
  }
}

async function saveBranding() {
  if (!selectedPartner?.email) return;
  const msg = document.getElementById('brandingMsg');
  if (msg) msg.textContent = 'Opslaan...';
  try {
    const fileInput = document.getElementById('brandLogoFile');
    const logoFile = fileInput?.files?.[0];
    if (logoFile) {
      const base64Data = await readFileAsDataUrl(logoFile);
      const uploadRes = await fetch(`/api/reseller-branding/${encodeURIComponent(selectedPartner.email)}/logo`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fileName: logoFile.name,
          mimeType: logoFile.type,
          base64Data
        })
      });
      const uploadOut = await uploadRes.json().catch(() => ({}));
      if (!uploadRes.ok) throw new Error(uploadOut.error || 'Logo upload mislukt');

      const logoInput = document.getElementById('brandLogoUrl');
      if (logoInput) logoInput.value = uploadOut.logoUrl || logoInput.value;
      if (fileInput) fileInput.value = '';
    }

    const payload = getBrandingPayload();
    const r = await fetch(`/api/reseller-branding/${encodeURIComponent(selectedPartner.email)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const out = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(out.error || 'Opslaan mislukt');

    const map = {
      brandSlug: out.slug || '',
      brandLogoUrl: out.logoUrl || '',
      brandPrimary: out.primaryColor || '#1A3B70',
      brandSecondary: out.secondaryColor || '#F2F6FB',
      brandAccent: out.accentColor || '#0F1D3A'
    };
    Object.keys(map).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = map[id];
    });
    updateBrandingPreview();
    if (msg) msg.textContent = 'Branding opgeslagen.';
  } catch (e) {
    if (msg) msg.textContent = e.message || 'Opslaan mislukt.';
  }
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(new Error('Bestand lezen mislukt'));
    reader.readAsDataURL(file);
  });
}

async function uploadBrandLogo() {
  if (!selectedPartner?.email) return;
  const fileInput = document.getElementById('brandLogoFile');
  const file = fileInput?.files?.[0];
  const msg = document.getElementById('brandingMsg');
  if (!file) {
    if (msg) msg.textContent = 'Kies eerst een logo-bestand.';
    return;
  }
  if (!/^image\//.test(file.type || '')) {
    if (msg) msg.textContent = 'Alleen afbeelding-bestanden zijn toegestaan.';
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    if (msg) msg.textContent = 'Bestand is te groot (max 5MB).';
    return;
  }

  if (msg) msg.textContent = 'Logo uploaden...';
  try {
    const base64Data = await readFileAsDataUrl(file);
    const r = await fetch(`/api/reseller-branding/${encodeURIComponent(selectedPartner.email)}/logo`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fileName: file.name,
        mimeType: file.type,
        base64Data
      })
    });
    const out = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(out.error || 'Upload mislukt');

    const logoInput = document.getElementById('brandLogoUrl');
    if (logoInput) logoInput.value = out.logoUrl || '';
    updateBrandingPreview();
    if (msg) msg.textContent = 'Logo geupload. Klik nu op "Branding opslaan".';
  } catch (e) {
    if (msg) msg.textContent = e.message || 'Upload mislukt.';
  }
}

function buildSidebar(role) {
  const adminItems = [
    { section:"overzicht", label:"Dashboard", url:"admin-dashboard.html#overzicht", icon:`<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>` },
    { section:"partners", label:"Partners", url:"admin-dashboard.html#partners", icon:`<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>` },
    { section:"dossiers", label:"Alle dossiers", url:"admin-dashboard.html#dossiers", icon:`<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>` },
    { section:"support", label:"Support", url:"admin-dashboard.html#support", icon:`<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>` },
    { section:"aanmeldingen", label:"Aanmeldingen", url:"admin-dashboard.html#aanmeldingen", icon:`<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>` },
    { section:"leden", label:"Leden & gebruikers", url:"admin-dashboard.html#leden", icon:`<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>` },
    { section:"instellingen", label:"Instellingen", url:"admin-dashboard.html#instellingen", icon:`<circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>` },
  ];
  
  let html = '<span class="dash-nav-section">Navigatie</span>';
  html += adminItems.slice(0, 6).map(it =>
    `<a href="${it.url}" class="dash-nav-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">${it.icon}</svg>
      ${it.label}
    </a>`
  ).join("");
  
  html += '<span class="dash-nav-section" style="margin-top:8px;">Systeem</span>';
  html += `<a href="${adminItems[6].url}" class="dash-nav-item">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">${adminItems[6].icon}</svg>
    ${adminItems[6].label}
  </a>`;
  
  document.getElementById("sidebarNav").innerHTML = html;
}

async function init() {
  const params     = new URLSearchParams(location.search);
  const emailParam = params.get("email") || params.get("name"); // ?name= backwards compat

  try {
    const r = await fetch("/api/user");
    if (!r.ok) { location.href = "/login.html"; return; }
    const u = await r.json();
    if (u.type !== 'admin' && u.type !== 'reseller') { location.href = '/login.html'; return; }
    currentUser = u;
    document.getElementById("userName").textContent = u.name;
    document.getElementById("userEmail").textContent = u.email;
    document.getElementById("userInitials").textContent = u.name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
    if (u.type === 'admin') {
      buildSidebar(u.type);
    } else {
      document.getElementById('sidebarNav').innerHTML = '<a href="reseller-dashboard.html" class="dash-nav-item">Dashboard</a>';
      document.getElementById('topbarTitle').textContent = 'Mijn partnerprofiel';
      const back = document.querySelector('.dash-topbar .btn-ghost');
      if (back) back.href = 'reseller-dashboard.html';
      document.getElementById('sidebar').classList.add('sidebar-collapsed');
    }

    if (u.type === 'admin' && !emailParam) {
      document.getElementById("pageContent").innerHTML = `<div class="empty-state" style="padding:80px 32px;"><p>Partner niet gevonden.</p><a href="admin-dashboard.html" class="btn-primary" style="margin-top:16px;">Terug naar dashboard</a></div>`;
      return;
    }

    const [usersRes, reqRes] = await Promise.all([
      fetch('/api/admin/users?type=reseller'),
      fetch('/api/reseller-requests?status=all')
    ]);
    const users       = usersRes.ok ? await usersRes.json() : [];
    const allRequests = reqRes.ok   ? await reqRes.json()   : [];

    // Match by email (new links) or company/name (old ?name= links)
    let user;
    if (u.type === 'admin') {
      user = users.find(x => x.email === emailParam);
      if (!user) user = users.find(x => (x.company || x.name) === emailParam);
    } else {
      user = users.find(x => x.email === u.email);
    }

    if (!user) {
      const backHref = u.type === 'admin' ? 'admin-dashboard.html' : 'reseller-dashboard.html';
      document.getElementById("pageContent").innerHTML = `<div class="empty-state" style="padding:80px 32px;"><p>Partner niet gevonden.</p><a href="${backHref}" class="btn-primary" style="margin-top:16px;">Terug</a></div>`;
      return;
    }

    const dossiers = allRequests.filter(req => req.resellerId === user.email);
    const idx      = users.findIndex(x => x.email === user.email);
    const p = {
      name:     user.company || user.name,
      contact:  user.name,
      email:    user.email,
      kvk:      user.companyId || '—',
      dossiers: dossiers.length,
      color:    PARTNER_COLORS[idx % PARTNER_COLORS.length]
    };
    selectedPartner = p;

    renderPage(p, dossiers);
  } catch(e) { location.href = "/login.html"; }
}

function logout() {
  if (confirm("Weet u zeker dat u wilt uitloggen?")) location.href = "/api/logout";
}

init();
</script>
