<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin – AandelenXpress</title>
    <meta name="description" content="Blog Admin bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <link rel="canonical" href="https://www.aandelenxpress.nl/blog-admin">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="dashboard-shared.css">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        .blog-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .blog-form-grid.full { grid-column: 1/-1; }
        .blog-form-field { display: flex; flex-direction: column; }
        .blog-form-field label { font-size: 0.75rem; color: #8A9BB5; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .blog-form-field input, .blog-form-field textarea, .blog-form-field select { padding: 10px 12px; border: 1px solid #E8EDF5; border-radius: 6px; font-family: inherit; font-size: 0.9rem; }
        .blog-form-field textarea { resize: vertical; min-height: 120px; }
        /* Quill editor */
        .ql-toolbar { border-radius: 6px 6px 0 0; border-color: #E8EDF5 !important; background: #f8fafc; }
        .ql-container { border-radius: 0 0 6px 6px; border-color: #E8EDF5 !important; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; }
        .ql-editor { min-height: 320px; }
        /* Image upload */
        .img-upload-area { border: 2px dashed #E8EDF5; border-radius: 8px; padding: 28px 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; background: #fafbfd; }
        .img-upload-area:hover { border-color: #1A3B70; }
        .img-upload-area img { max-width: 100%; max-height: 220px; border-radius: 6px; margin-bottom: 10px; }
        /* rest */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 8px; }
        .category-check { display: flex; align-items: center; gap: 8px; }
        .category-check input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .blog-table-head { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 60px; gap: 12px; padding: 12px 16px; background: #f8fafc; border-radius: 8px 8px 0 0; font-weight: 600; font-size: 0.85rem; color: #8A9BB5; }
        .blog-table-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 60px; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #E8EDF5; align-items: center; cursor: pointer; }
        .blog-table-row:hover { background: #f8fafc; }
        .blog-title { font-weight: 500; color: #0F1D3A; }
        .blog-status { display: inline-flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 500; padding: 4px 8px; border-radius: 4px; }
        .blog-status.published { color: #22863a; background: #f0ffe0; }
        .blog-status.draft { color: #a4610c; background: #fffbeb; }
        .blog-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .blog-btn-small { padding: 4px 10px; font-size: 0.8rem; border: none; border-radius: 4px; cursor: pointer; background: #e0e9f1; color: #0F1D3A; }
        .blog-btn-small:hover { background: #d0dfe9; }
        .blog-btn-small.danger { background: #fed7d7; color: #742a2a; }
        .blog-btn-small.danger:hover { background: #ffc9c9; }
        .toggle-switch { display: inline-block; width: 40px; height: 24px; background: #cbd5e1; border-radius: 12px; position: relative; cursor: pointer; }
        .toggle-switch.on { background: #10b981; }
        .toggle-switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; left: 2px; top: 2px; transition: left 0.2s; }
        .toggle-switch.on::after { left: 18px; }
    </style>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.aandelenxpress.nl/blog-admin">
    <meta property="og:title" content="Blog Admin – AandelenXpress">
    <meta property="og:description" content="Blog Admin bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <meta property="og:image" content="https://www.aandelenxpress.nl/apple-touch-icon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Blog Admin – AandelenXpress">
    <meta name="twitter:description" content="Blog Admin bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <meta name="twitter:image" content="https://www.aandelenxpress.nl/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
</head>
<body>
<div class="dash-wrap">
    <aside class="dash-sidebar">
        <div class="dash-logo">
            <a href="/admin-dashboard" style="display:block;">
                <img src="AandelenXpress logo.avif" alt="AandelenXpress" class="dash-logo-img">
            </a>
        </div>
        <nav class="dash-nav">
            <span class="dash-nav-section">Blog</span>
            <a href="#" class="dash-nav-item active" data-section="posts">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Alle artikelen
            </a>
            <a href="#" class="dash-nav-item" data-section="new">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nieuw artikel
            </a>
        </nav>
        <div class="dash-sidebar-foot">
            <div class="dash-user-row">
                <div class="dash-avatar admin-avatar" id="userInitials">A</div>
                <div class="dash-user-info">
                    <div class="dash-user-name" id="userName">Admin</div>
                    <div class="dash-user-email" id="userEmail"></div>
                </div>
            </div>
            <div class="admin-badge">Blog Admin</div>
            <button class="dash-logout-btn" onclick="logout()">Uitloggen</button>
        </div>
    </aside>

    <main class="dash-main">
        <div class="dash-topbar">
            <span class="dash-topbar-title" id="topbarTitle">Blog artikelen</span>
            <div class="dash-topbar-actions">
                <a href="/admin-dashboard" class="btn-ghost" style="padding: 8px 14px; font-size: 0.85rem;">🏠 Ga terug naar dashboard</a>
                <a href="/blog" target="_blank" rel="noopener noreferrer" class="btn-ghost" style="padding: 8px 14px; font-size: 0.85rem;">🔗 Ga naar blog</a>
            </div>
        </div>

        <div class="dash-content">
            <!-- POSTS LIST -->
            <div class="dash-section active" id="section-posts">
                <div class="section-row mb-20">
                    <span class="section-heading">Alle artikelen</span>
                    <span id="postsCount" class="text-muted text-sm">Laden...</span>
                </div>
                <div class="dash-card">
                    <div class="blog-table-head">
                        <span>Titel</span>
                        <span>Categorie</span>
                        <span>Status</span>
                        <span>Datum</span>
                        <span></span>
                    </div>
                    <div id="postsTable"></div>
                </div>
            </div>

            <!-- NEW POST FORM -->
            <div class="dash-section" id="section-new">
                <div class="section-row mb-20">
                    <span class="section-heading">Nieuw artikel</span>
                </div>
                <div class="dash-card">
                    <form id="newPostForm" style="padding: 20px;">
                        <div class="blog-form-grid full">
                            <div class="blog-form-field">
                                <label>Titel *</label>
                                <input type="text" id="postTitle" placeholder="Artikel titel" required>
                            </div>
                            <div class="blog-form-field">
                                <label>Auteur</label>
                                <input type="text" id="postAuthor" value="AandelenXpress">
                            </div>
                        </div>

                        <div class="blog-form-grid full">
                            <div class="blog-form-field">
                                <label>Samenvatting (excerpt)</label>
                                <textarea id="postExcerpt" placeholder="Korte beschrijving van het artikel"></textarea>
                            </div>
                        </div>

                        <div class="blog-form-grid full">
                            <div class="blog-form-field">
                                <label>Artikelinhoud *</label>
                                <div id="quill-editor"></div>
                            </div>
                        </div>

                        <div class="blog-form-grid full" style="margin-top:24px;">
                            <div class="blog-form-field">
                                <label>Omslagafbeelding</label>
                                <div class="img-upload-area" id="imageUploadArea" onclick="document.getElementById('postImageFile').click()">
                                    <img id="imagePreview" style="display:none;">
                                    <div id="imagePlaceholder">
                                        <svg width="36" height="36" fill="none" stroke="#8A9BB5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                        <p style="color:#8A9BB5;margin:8px 0 0;font-size:0.85rem;">Klik om een afbeelding te uploaden (JPG, PNG, WebP)</p>
                                    </div>
                                </div>
                                <input type="file" id="postImageFile" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
                                <button type="button" id="clearImageBtn" onclick="clearImage()" style="display:none;margin-top:8px;padding:6px 12px;background:#fed7d7;color:#742a2a;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem;">✕ Afbeelding verwijderen</button>
                            </div>
                        </div>

                        <div class="blog-form-grid full">
                            <div class="blog-form-field">
                                <label>Categorieën</label>
                                <div class="categories-grid">
                                    <label class="category-check">
                                        <input type="checkbox" name="categories" value="BV-oprichting">
                                        <span>BV-oprichting</span>
                                    </label>
                                    <label class="category-check">
                                        <input type="checkbox" name="categories" value="Holding">
                                        <span>Holding</span>
                                    </label>
                                    <label class="category-check">
                                        <input type="checkbox" name="categories" value="Fiscaal">
                                        <span>Fiscaal</span>
                                    </label>
                                    <label class="category-check">
                                        <input type="checkbox" name="categories" value="Digitalisering">
                                        <span>Digitalisering</span>
                                    </label>
                                    <label class="category-check">
                                        <input type="checkbox" name="categories" value="Wetgeving">
                                        <span>Wetgeving</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="blog-form-grid">
                            <div class="blog-form-field">
                                <label>
                                    <input type="checkbox" id="postFeatured" style="width: auto; margin-right: 8px;">
                                    Uitgelicht artikel
                                </label>
                            </div>
                            <div class="blog-form-field">
                                <label>
                                    <input type="checkbox" id="postPublished" checked style="width: auto; margin-right: 8px;">
                                    Direct publiceren
                                </label>
                            </div>
                        </div>

                        <div style="display: flex; gap: 12px; margin-top: 24px;">
                            <button type="submit" class="btn-primary" style="flex: 1; padding: 12px;">Opslaan</button>
                            <button type="button" class="btn-ghost" onclick="document.getElementById('newPostForm').reset();" style="flex: 1; padding: 12px;">Wissen</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
// ── Quill rich text editor ───────────────────────────────────────────────────
const quill = new Quill('#quill-editor', {
    theme: 'snow',
    placeholder: 'Schrijf hier de volledige artikel inhoud...',
    modules: {
        toolbar: {
            container: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['blockquote', 'code-block'],
                ['link', 'image'],
                [{ color: [] }, { background: [] }],
                [{ align: [] }],
                ['clean']
            ],
            handlers: {
                image: function() {
                    const input = document.createElement('input');
                    input.setAttribute('type', 'file');
                    input.setAttribute('accept', 'image/*');
                    input.click();
                    input.onchange = () => {
                        const file = input.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const range = quill.getSelection(true);
                            quill.insertEmbed(range.index, 'image', e.target.result);
                        };
                        reader.readAsDataURL(file);
                    };
                }
            }
        }
    }
});

// ── Cover image upload ───────────────────────────────────────────────────────
let postImageBase64 = '';

function handleImageUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        postImageBase64 = e.target.result;
        const preview = document.getElementById('imagePreview');
        const placeholder = document.getElementById('imagePlaceholder');
        preview.src = postImageBase64;
        preview.style.display = 'block';
        placeholder.style.display = 'none';
        document.getElementById('clearImageBtn').style.display = 'inline-block';
    };
    reader.readAsDataURL(file);
}

function clearImage() {
    postImageBase64 = '';
    document.getElementById('postImageFile').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imagePlaceholder').style.display = 'block';
    document.getElementById('clearImageBtn').style.display = 'none';
}

// ── Auth + load ──────────────────────────────────────────────────────────────
async function loadUser() {
    try {
        const r = await fetch('/api/user');
        if (!r.ok) { window.location.href = '/login.html'; return; }
        const u = await r.json();
        if (u.type !== 'admin') { window.location.href = '/admin-dashboard.html'; return; }
        
        document.getElementById('userName').textContent = u.name;
        document.getElementById('userEmail').textContent = u.email;
        document.getElementById('userInitials').textContent = u.name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
        
        loadPosts();
    } catch(e) { window.location.href = '/login.html'; }
}

async function loadPosts() {
    try {
        const r = await fetch('/api/blog/posts?draft=true');
        if (!r.ok) return;
        const posts = await r.json();
        
        const html = posts.map(p => `
            <div class="blog-table-row" onclick="editPost('${p.id}')">
                <div class="blog-title">${p.title}</div>
                <div class="text-muted text-sm">${p.categories.join(', ') || '—'}</div>
                <div><span class="blog-status ${p.published ? 'published' : 'draft'}">${p.published ? 'Gepubliceerd' : 'Concept'}</span></div>
                <div class="text-muted text-sm">${new Date(p.createdAt).toLocaleDateString('nl-NL')}</div>
                <div class="blog-actions" onclick="event.stopPropagation();">
                    <button class="blog-btn-small" onclick="editPost('${p.id}')">Bewerk</button>
                    <button class="blog-btn-small danger" onclick="deletePost('${p.id}')">Verwijder</button>
                </div>
            </div>
        `).join('');
        
        document.getElementById('postsTable').innerHTML = html || '<div style="padding: 32px; text-align: center; color: #8A9BB5;">Geen artikelen</div>';
        document.getElementById('postsCount').textContent = posts.length + ' artikelen';
    } catch(e) {
        console.error('Error loading posts:', e);
    }
}

async function editPost(id) {
    try {
        const r = await fetch(`/api/blog/posts/${id}`);
        if (!r.ok) return;
        const post = await r.json();
        
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postExcerpt').value = post.excerpt;
        document.getElementById('postAuthor').value = post.author;
        document.getElementById('postFeatured').checked = post.featured;
        document.getElementById('postPublished').checked = post.published;

        // Quill content
        quill.clipboard.dangerouslyPasteHTML(post.content || '');

        // Cover image
        if (post.image) {
            postImageBase64 = post.image;
            const preview = document.getElementById('imagePreview');
            preview.src = post.image;
            preview.style.display = 'block';
            document.getElementById('imagePlaceholder').style.display = 'none';
            document.getElementById('clearImageBtn').style.display = 'inline-block';
        } else {
            clearImage();
        }
        
        document.querySelectorAll('input[name="categories"]').forEach(cb => {
            cb.checked = post.categories.includes(cb.value);
        });
        
        document.getElementById('section-posts').classList.remove('active');
        document.getElementById('section-new').classList.add('active');
        document.getElementById('topbarTitle').textContent = 'Bewerk artikel';
        document.querySelectorAll('.dash-nav-item').forEach(i => i.classList.remove('active'));
        
        document.getElementById('newPostForm').dataset.editId = id;
    } catch(e) {
        alert('Fout bij laden artikel');
    }
}

async function deletePost(id) {
    if (!confirm('Weet u zeker dat u dit artikel wilt verwijderen?')) return;
    
    try {
        const r = await fetch(`/api/blog/posts/${id}`, { method: 'DELETE' });
        if (!r.ok) { alert('Fout bij verwijderen'); return; }
        loadPosts();
        showToast('Artikel verwijderd');
    } catch(e) {
        alert('Fout: ' + e.message);
    }
}

document.getElementById('newPostForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const editId = e.target.dataset.editId;
    const content = quill.root.innerHTML.trim();
    if (!content || content === '<p><br></p>') {
        alert('Vul de artikelinhoud in.');
        return;
    }
    const categories = Array.from(document.querySelectorAll('input[name="categories"]:checked')).map(cb => cb.value);
    
    const data = {
        title: document.getElementById('postTitle').value,
        excerpt: document.getElementById('postExcerpt').value,
        content,
        image: postImageBase64 || null,
        author: document.getElementById('postAuthor').value,
        categories,
        featured: document.getElementById('postFeatured').checked,
        published: document.getElementById('postPublished').checked
    };
    
    try {
        const method = editId ? 'PATCH' : 'POST';
        const url = editId ? `/api/blog/posts/${editId}` : '/api/blog/posts';
        
        const r = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (!r.ok) {
            const err = await r.json();
            alert('Fout: ' + (err.error || 'Onbekende fout'));
            return;
        }
        
        // Reset form
        document.getElementById('newPostForm').reset();
        quill.setContents([]);
        clearImage();
        delete document.getElementById('newPostForm').dataset.editId;
        
        document.getElementById('section-new').classList.remove('active');
        document.getElementById('section-posts').classList.add('active');
        document.getElementById('topbarTitle').textContent = 'Blog artikelen';
        document.querySelectorAll('.dash-nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector('[data-section="posts"]').classList.add('active');
        
        loadPosts();
        showToast(editId ? 'Artikel bijgewerkt' : 'Artikel gepubliceerd');
    } catch(e) {
        alert('Fout: ' + e.message);
    }
});

document.querySelectorAll('.dash-nav-item').forEach(item => {
    item.addEventListener('click', e => {
        e.preventDefault();
        const section = item.dataset.section;
        document.querySelectorAll('.dash-nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.dash-section').forEach(s => s.classList.remove('active'));
        item.classList.add('active');
        document.getElementById('section-' + section).classList.add('active');
        
        if (section === 'new') {
            document.getElementById('topbarTitle').textContent = 'Nieuw artikel';
            document.getElementById('newPostForm').reset();
            quill.setContents([]);
            clearImage();
            delete document.getElementById('newPostForm').dataset.editId;
        } else {
            document.getElementById('topbarTitle').textContent = 'Blog artikelen';
        }
    });
});

function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = '✓ ' + msg;
    Object.assign(t.style, {position:'fixed',bottom:'24px',right:'24px',background:'#0A1E42',color:'white',padding:'14px 20px',borderRadius:'8px',fontWeight:'500',fontSize:'0.9rem',zIndex:'9999',boxShadow:'0 8px 24px rgba(0,0,0,0.2)'});
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function logout() {
    if(confirm('Weet u zeker dat u wilt uitloggen?')) window.location.href = '/api/logout';
}

loadUser();
</script>
</body>
</html>
