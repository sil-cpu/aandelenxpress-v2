function buildTimeline(statusKey) {
  const stages = [
    { label:"Aanvraag ontvangen", sub:"Opdracht ingediend door partner" },
    { label:"iDIN-verificatie",   sub:"Identiteitscontrole klant" },
    { label:"Notariële akte",     sub:"Conceptakte opgesteld en ondertekend" },
    { label:"KvK-inschrijving",   sub:"Inschrijving Kamer van Koophandel" },
    { label:"Voltooid",           sub:"BV-oprichting succesvol afgerond" },
  ];
  const order = { new:0, intake:0, ident:1, notary:2, kvk:3, complete:4 };
  const cur = order[statusKey] ?? 0;
  const allDone = statusKey === "complete";
  return stages.map((s,i) => {
    const done = allDone || i < cur;
    const active = !allDone && i === cur;
    return `<div class="process-step${done?" done":""}${active?" current":""}">
      <div class="step-dot">${done?"✓":""}</div>
      <div class="step-info">
        <div class="step-label">${s.label}</div>
        <div class="step-sub">${active?"In behandeling":done?"Afgerond":s.sub}</div>
      </div></div>`;
  }).join("");
}

function buildTimelineHorizontal(statusKey) {
  const stages = [
    "Aanvraag ontvangen", "iDIN-verificatie", "Notariële akte", "KvK-inschrijving", "Voltooid"
  ];
  const order = { new:0, intake:0, ident:1, notary:2, kvk:3, complete:4 };
  const cur = order[statusKey] ?? 0;
  const allDone = statusKey === "complete";
  return stages.map((label,i) => {
    const done = allDone || i < cur;
    const active = !allDone && i === cur;
    const isLast = i === stages.length - 1;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative;">
      ${i > 0 ? `<div style="position:absolute;top:14px;right:50%;width:100%;height:2px;background:${done||active?'#1A3B70':'#E8EDF5'};z-index:0;"></div>` : ""}
      <div style="width:28px;height:28px;border-radius:50%;border:2px solid ${done?'#1A3B70':active?'#2B6CB5':'#E8EDF5'};background:${done?'#1A3B70':active?'#EEF4FF':'white'};display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:600;color:${done?'white':active?'#2B6CB5':'#CBD5E0'};position:relative;z-index:1;">
        ${done?"✓":i+1}
      </div>
      <div style="margin-top:8px;font-size:0.78rem;font-weight:${active?'600':'400'};color:${done?'#1A3B70':active?'#1A3B70':'#A0AEC0'};text-align:center;line-height:1.3;">${label}</div>
      <div style="font-size:0.72rem;color:${active?'#2B6CB5':'#CBD5E0'};margin-top:2px;">${active?"Actief":done?"Afgerond":""}</div>
    </div>`;
  }).join("");
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString("nl-NL", { day:"numeric", month:"long", year:"numeric" });
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.createElement("div");
    toast.textContent = "✓ Link gekopieerd";
    Object.assign(toast.style, {
      position: "fixed", bottom: "24px", right: "24px", background: "#0A1E42",
      color: "white", padding: "12px 20px", borderRadius: "8px", fontWeight: "500",
      fontSize: "0.9rem", zIndex: "9999", boxShadow: "0 4px 12px rgba(0,0,0,0.15)"
    });
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }).catch(() => alert("Kon link niet kopiëren"));
}

async function submitTicket(dossierNr) {
  const subject = document.getElementById("ticketSubject")?.value?.trim();
  const message = document.getElementById("ticketMessage")?.value?.trim();
  const email = document.getElementById("ticketEmail")?.value?.trim();

  if (!subject || !message || !email) {
    alert("Vul alsjeblieft alle velden in");
    return;
  }

  try {
    const r = await fetch("/api/tickets", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dossierNr, subject, message, name: "Admin", email })
    });
    if (!r.ok) throw new Error("Request failed");
    
    document.getElementById("ticketSubject").value = "";
    document.getElementById("ticketMessage").value = "";
    
    showToast("Verzoek ingediend!");
    loadTickets(dossierNr);
  } catch (e) {
    alert("Fout bij indienen verzoek: " + e.message);
  }
}

async function loadTickets(dossierNr) {
  try {
    const r = await fetch(`/api/tickets/${dossierNr}`);
    if (!r.ok) throw new Error("Failed to load tickets");
    const tickets = await r.json();
    
    const container = document.getElementById("ticketsList");
    if (!tickets || tickets.length === 0) {
      container.innerHTML = '<p style="color:#A0AEC0;font-size:0.9rem;">Geen verzoeken ingediend</p>';
      return;
    }

    container.innerHTML = tickets.map(t => `
      <div style="padding:12px;border:1px solid #E8EDF5;border-radius:6px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-weight:500;color:#0F1D3A;">${t.subject}</div>
          <span style="font-size:0.75rem;padding:4px 8px;background:#F0F2F7;color:#718096;border-radius:4px;">${t.status||'Ingediend'}</span>
        </div>
        <div style="font-size:0.85rem;color:#718096;margin-bottom:8px;">${t.message}</div>
        <div style="font-size:0.75rem;color:#A0AEC0;">${new Date(t.createdAt).toLocaleDateString('nl-NL')} • ${t.email}</div>
      </div>
    `).join("");
  } catch (e) {
    console.error("Error loading tickets:", e);
  }
}

function showToast(msg) {
  const toast = document.createElement("div");
  toast.textContent = msg;
  toast.style.cssText = "position:fixed;bottom:20px;right:20px;background:#10B981;color:white;padding:12px 16px;border-radius:6px;font-size:0.9rem;z-index:9999;";
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

async function init() {
  const params = new URLSearchParams(location.search);
  const nr = params.get("nr");

  try {
    const r = await fetch("/api/user");
    if (!r.ok) { location.href = "/login"; return; }
    const u = await r.json();
    document.getElementById("userName").textContent = u.name;
    document.getElementById("userEmail").textContent = u.email;
    document.getElementById("userInitials").textContent = u.name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
    buildSidebar(u.type);

    const d = allDossiers.find(x => x.dossierNr === nr);
    if (!d) {
      document.getElementById("pageContent").innerHTML = `<div class="empty-state" style="padding:80px 32px;"><p>Dossier niet gevonden.</p><a href="${u.type==='admin'?'admin-dashboard.html':'reseller-dashboard.html'}" class="btn-primary" style="margin-top:16px;">Terug naar dashboard</a></div>`;
      return;
    }
    document.title = d.name + " – AandelenXpress";
    document.getElementById("topbarTitle").textContent = d.name;
    renderPage(d, u.type);
    
    // Load tickets after page is rendered
    setTimeout(() => loadTickets(nr), 100);
  } catch(e) { location.href = "/login"; }
}

function logout() {
  if (confirm("Weet u zeker dat u wilt uitloggen?")) location.href = "/api/logout";
}

init();
</script>
</body>
</html>
