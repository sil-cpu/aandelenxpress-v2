<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord instellen – AandelenXpress</title>
    <meta name="description" content="Wachtwoord instellen bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <link rel="canonical" href="https://www.aandelenxpress.nl/reset-password">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reset-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F7F9FC;
            padding: 24px;
        }
        .reset-card {
            background: #fff;
            border-radius: 14px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 32px rgba(26,59,112,0.10);
            border: 1px solid #E8EDF5;
        }
        .reset-logo {
            margin-bottom: 28px;
        }
        .reset-logo img {
            height: 32px;
        }
        .reset-card h1 {
            font-size: 1.35rem;
            color: #0F1D3A;
            margin: 0 0 8px;
        }
        .reset-card p {
            color: #718096;
            font-size: 0.9rem;
            margin: 0 0 28px;
            line-height: 1.5;
        }
        .reset-field {
            margin-bottom: 18px;
        }
        .reset-field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #4A5568;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .reset-field input {
            width: 100%;
            box-sizing: border-box;
            padding: 11px 14px;
            border: 1.5px solid #CBD5E0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .reset-field input:focus {
            border-color: #1A3B70;
        }
        .reset-submit {
            width: 100%;
            background: #1A3B70;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .reset-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .reset-msg {
            font-size: 0.9rem;
            padding: 12px 14px;
            border-radius: 7px;
            margin-bottom: 16px;
            display: none;
        }
        .reset-msg.error   { background: #FFF5F5; color: #c53030; border: 1px solid #FED7D7; }
        .reset-msg.success { background: #F0FFF4; color: #276749; border: 1px solid #C6F6D5; }
        .reset-back {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 0.88rem;
            color: #718096;
            text-decoration: none;
        }
        .reset-back:hover { color: #1A3B70; }
    </style>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.aandelenxpress.nl/reset-password">
    <meta property="og:title" content="Wachtwoord instellen – AandelenXpress">
    <meta property="og:description" content="Wachtwoord instellen bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <meta property="og:image" content="https://www.aandelenxpress.nl/apple-touch-icon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wachtwoord instellen – AandelenXpress">
    <meta name="twitter:description" content="Wachtwoord instellen bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <meta name="twitter:image" content="https://www.aandelenxpress.nl/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
</head>
<body>

<div class="reset-page">
    <div class="reset-card">
        <div class="reset-logo">
            <img src="AandelenXpress logo.avif" alt="AandelenXpress">
        </div>

        <!-- Invalid / expired token state -->
        <div id="invalidState" style="display:none;">
            <h1>Link ongeldig</h1>
            <p>Deze herstellink is verlopen of ongeldig. Links zijn 1 uur geldig.</p>
            <a href="/login" style="display:block;background:#1A3B70;color:#fff;text-align:center;padding:13px;border-radius:8px;font-weight:600;text-decoration:none;margin-top:8px;">Nieuwe link aanvragen</a>
        </div>

        <!-- Reset form state -->
        <div id="formState">
            <h1>Nieuw wachtwoord</h1>
            <p>Kies een nieuw wachtwoord voor uw account.</p>

            <div id="resetMsg" class="reset-msg"></div>

            <div class="reset-field">
                <label for="newPassword">Nieuw wachtwoord</label>
                <input type="password" id="newPassword" placeholder="Min. 8 tekens" autocomplete="new-password">
            </div>
            <div class="reset-field">
                <label for="confirmPassword">Herhaal wachtwoord</label>
                <input type="password" id="confirmPassword" placeholder="Nogmaals hetzelfde" autocomplete="new-password">
            </div>

            <button class="reset-submit" id="resetBtn" onclick="submitReset()">Wachtwoord opslaan</button>
        </div>

        <!-- Success state -->
        <div id="successState" style="display:none;">
            <h1>Wachtwoord gewijzigd ✓</h1>
            <p>Uw nieuwe wachtwoord is opgeslagen. U kunt nu inloggen.</p>
            <a href="/login" style="display:block;background:#1A3B70;color:#fff;text-align:center;padding:13px;border-radius:8px;font-weight:600;text-decoration:none;margin-top:8px;">Naar inloggen →</a>
        </div>

        <a href="/login" class="reset-back">← Terug naar inloggen</a>
    </div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    if (!token) {
        document.getElementById('formState').style.display = 'none';
        document.getElementById('invalidState').style.display = '';
    }

    async function submitReset() {
        const pwd  = document.getElementById('newPassword').value;
        const pwd2 = document.getElementById('confirmPassword').value;
        const msg  = document.getElementById('resetMsg');
        const btn  = document.getElementById('resetBtn');

        msg.className = 'reset-msg';
        msg.style.display = 'none';

        if (!pwd || pwd.length < 8) {
            msg.textContent = 'Wachtwoord moet minimaal 8 tekens zijn.';
            msg.className = 'reset-msg error';
            msg.style.display = 'block';
            return;
        }
        if (pwd !== pwd2) {
            msg.textContent = 'Wachtwoorden komen niet overeen.';
            msg.className = 'reset-msg error';
            msg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Opslaan...';

        try {
            const res = await fetch('/api/auth/reset-password-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword: pwd })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) {
                document.getElementById('formState').style.display = 'none';
                document.getElementById('successState').style.display = '';
            } else if (res.status === 400 && data.error?.includes('ongeldig')) {
                document.getElementById('formState').style.display = 'none';
                document.getElementById('invalidState').style.display = '';
            } else {
                msg.textContent = data.error || 'Er is een fout opgetreden. Probeer het opnieuw.';
                msg.className = 'reset-msg error';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Wachtwoord opslaan';
            }
        } catch {
            msg.textContent = 'Verbindingsfout. Probeer het opnieuw.';
            msg.className = 'reset-msg error';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Wachtwoord opslaan';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.getElementById('formState').style.display !== 'none') {
            submitReset();
        }
    });
</script>

</body>
</html>
