<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen – AandelenXpress</title>
    <meta name="description" content="Inloggen bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <link rel="canonical" href="https://www.aandelenxpress.nl/login">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-left-back-btn {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 20px;
            border: 1px solid rgba(168, 197, 224, 0.5);
            border-radius: 10px;
            color: #E5EEF9;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .login-left-back-btn:hover {
            background: rgba(168, 197, 224, 0.1);
            border-color: rgba(168, 197, 224, 0.85);
        }
    </style>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.aandelenxpress.nl/login">
    <meta property="og:title" content="Inloggen – AandelenXpress">
    <meta property="og:description" content="Inloggen bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <meta property="og:image" content="https://www.aandelenxpress.nl/apple-touch-icon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Inloggen – AandelenXpress">
    <meta name="twitter:description" content="Inloggen bij AandelenXpress. Digitaal notariskantoor voor BV-oprichting en zakelijke notariële diensten.">
    <meta name="twitter:image" content="https://www.aandelenxpress.nl/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
</head>
<body>

    <div class="login-page">

        <!-- Left brand panel -->
        <div class="login-brand">
            <div class="login-brand-logo">
                <img src="AandelenXpress logo.avif" alt="AandelenXpress">
            </div>
            <h2>Welkom terug bij<br><em>AandelenXpress</em></h2>
            <p class="login-brand-sub">Digitaal notariskantoor gespecialiseerd in BV's.</p>
            <a href="/" class="login-left-back-btn">&larr; Terug naar website</a>
        </div>

        <!-- Right form panel -->
        <div class="login-form-side">
            <div class="login-form-box">
                <h1>Inloggen</h1>
                <form id="loginForm" novalidate>
                    <div class="login-field">
                        <label for="email">E-mailadres</label>
                        <input type="email" id="email" name="email" placeholder="naam@kantoor.nl" autocomplete="email" required>
                    </div>
                    <div class="login-field">
                        <div class="login-field-row">
                            <label for="password">Wachtwoord</label>
                            <a href="#" class="login-forgot" onclick="alert('Neem contact op met support'); return false;">Vergeten?</a>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <div class="login-field" id="smsCodeField" style="display:none;">
                        <div class="login-field-row">
                            <label for="smsCode">SMS-code</label>
                            <a href="#" class="login-forgot" id="resendSmsLink" style="display:none;" onclick="return false;">Nieuwe code</a>
                        </div>
                        <input type="text" id="smsCode" name="smsCode" placeholder="123456" inputmode="numeric" autocomplete="one-time-code" maxlength="6">
                        <div id="smsInfo" style="margin-top:6px;color:#8A9BB5;font-size:0.82rem;display:none;"></div>
                    </div>
                    <div id="loginError" style="color: #c33; font-size: 0.9rem; margin-bottom: 12px; display: none;"></div>
                    <button type="submit" class="login-submit" id="loginSubmitBtn">Inloggen</button>
                </form>

                <p class="login-footer-note">
                    <a href="#" onclick="history.back(); return false;">&larr; Terug</a> &nbsp;&middot;&nbsp;
                    Terug naar <a href="index.html">aandelenxpress.nl</a> &nbsp;&middot;&nbsp;
                    <a href="contact.html">Hulp nodig?</a>
                </p>
            </div>
        </div>

    </div>

    <script>
        let loginToken = null;

        function resetLoginError() {
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
        }

        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function setSmsStep(active, maskedPhone) {
            const smsField = document.getElementById('smsCodeField');
            const smsInfo = document.getElementById('smsInfo');
            const submitBtn = document.getElementById('loginSubmitBtn');
            const resendLink = document.getElementById('resendSmsLink');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            smsField.style.display = active ? 'block' : 'none';
            smsInfo.style.display = active ? 'block' : 'none';
            resendLink.style.display = active ? 'inline' : 'none';
            emailInput.readOnly = active;
            passwordInput.readOnly = active;
            submitBtn.textContent = active ? 'Code verifiëren' : 'Inloggen';

            if (active) {
                smsInfo.textContent = `We hebben een SMS-code gestuurd naar ${maskedPhone}.`;
                document.getElementById('smsCode').focus();
            } else {
                document.getElementById('smsCode').value = '';
            }
        }

        document.getElementById('resendSmsLink').addEventListener('click', async () => {
            resetLoginError();
            if (!loginToken) return;
            try {
                const response = await fetch('/api/login/resend-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginToken })
                });
                const data = await response.json();
                if (!response.ok) return showLoginError(data.error || 'Nieuwe code sturen is mislukt');
                document.getElementById('smsInfo').textContent = `Nieuwe SMS-code verstuurd naar ${data.maskedPhone}.`;
            } catch {
                showLoginError('Verbindingsfout. Probeer het opnieuw.');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            resetLoginError();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const smsCode = document.getElementById('smsCode').value.trim();

            try {
                if (!loginToken) {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await response.json();

                    if (!response.ok) return showLoginError(data.error || 'Login mislukt');
                    if (data.requires2fa && data.loginToken) {
                        loginToken = data.loginToken;
                        setSmsStep(true, data.maskedPhone || 'uw nummer');
                        return;
                    }
                    if (data.success) {
                        window.location.href = data.redirect;
                        return;
                    }
                    showLoginError('Login mislukt');
                } else {
                    if (!/^\d{6}$/.test(smsCode)) {
                        return showLoginError('Voer een geldige 6-cijferige SMS-code in');
                    }

                    const response = await fetch('/api/login/verify-sms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ loginToken, code: smsCode })
                    });
                    const data = await response.json();

                    if (!response.ok) return showLoginError(data.error || 'Verificatie mislukt');
                    if (data.success) {
                        window.location.href = data.redirect;
                        return;
                    }
                    showLoginError('Verificatie mislukt');
                }
            } catch {
                showLoginError('Verbindingsfout. Probeer het opnieuw.');
            }
        });
    </script>

</body>
</html>
