<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen – AandelenXpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-left-back-btn {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 20px;
            border: 1px solid rgba(168, 197, 224, 0.5);
            border-radius: 10px;
            color: #E5EEF9;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .login-left-back-btn:hover {
            background: rgba(168, 197, 224, 0.1);
            border-color: rgba(168, 197, 224, 0.85);
        }
    </style>
</head>
<body>

    <div class="login-page">

        <!-- Left brand panel -->
        <div class="login-brand">
            <div class="login-brand-logo">
                <img src="AandelenXpress logo.avif" alt="AandelenXpress">
            </div>
            <h2>Welkom terug bij<br><em>AandelenXpress</em></h2>
            <p class="login-brand-sub">Digitaal notariskantoor gespecialiseerd in BV's.</p>
            <a href="/" class="login-left-back-btn">&larr; Terug naar website</a>
        </div>

        <!-- Right form panel -->
        <div class="login-form-side">
            <div class="login-form-box">
                <h1>Inloggen</h1>
                <form id="loginForm" novalidate>
                    <div class="login-field">
                        <label for="email">E-mailadres</label>
                        <input type="email" id="email" name="email" placeholder="naam@kantoor.nl" autocomplete="email" required>
                    </div>
                    <div class="login-field">
                        <div class="login-field-row">
                            <label for="password">Wachtwoord</label>
                            <a href="#" class="login-forgot" onclick="alert('Neem contact op met support'); return false;">Vergeten?</a>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <div id="loginError" style="color: #c33; font-size: 0.9rem; margin-bottom: 12px; display: none;"></div>
                    <button type="submit" class="login-submit">Inloggen</button>
                </form>

                <p class="login-footer-note">
                    <a href="#" onclick="history.back(); return false;">&larr; Terug</a> &nbsp;&middot;&nbsp;
                    Terug naar <a href="index.html">aandelenxpress.nl</a> &nbsp;&middot;&nbsp;
                    <a href="contact.html">Hulp nodig?</a>
                </p>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Redirect to dashboard
                    window.location.href = data.redirect;
                } else {
                    errorDiv.textContent = data.error || 'Login mislukt';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Verbindingsfout. Probeer het opnieuw.';
                errorDiv.style.display = 'block';
            }
        });
    </script>

</body>
</html>
